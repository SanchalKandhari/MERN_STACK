<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 1px solid red;
            height: 500px;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }
        #container >div{
            border: 1px solid black;
            width: 80%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div style="font-family:Arial, Helvetica, sans-serif;">this is div 1</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">this is div 2</div>
        <div style="font-family: Verdana, Geneva, Tahoma, sans-serif;">this is div 3</div>
    </div>
</body>
</html>
